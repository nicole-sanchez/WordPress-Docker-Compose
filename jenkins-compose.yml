version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins_wp
    restart: always
    privileged: true
    user: root
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - "C:\Users\Nicole\practica-wordpress:/var/proyecto"
    networks:
      - red_wordpress

volumes:
  jenkins_home:

networks:
  red_wordpress:
    external: true